const Assessment = ({ questions, onComplete }) => {
  const [currentIdx, setCurrentIdx] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [visible, setVisible] = useState(true);
  const lockedRef = useRef(false);
  const topRef = useRef(null);

    topRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, [currentIdx]);

    if (lockedRef.current) return;
    lockedRef.current = true;

    // Fade out
    setVisible(false);

      const newAnswers = [...answers, type];
      setAnswers(newAnswers);

      if (currentIdx < questions.length - 1) {
        setCurrentIdx(i => i + 1);
        // Small delay then fade in
        setTimeout(() => {
          setVisible(true);
          lockedRef.current = false;
        }, 80);
      } else {
        onComplete(newAnswers);
      }
    }, 300);
  };

  const progress = ((currentIdx + 1) / questions.length) * 100;
  const q = questions[currentIdx];

  return (
    <div className="w-full max-w-3xl mx-auto py-16 px-4">
      <div ref={topRef} style={{ scrollMarginTop: '20px' }} />

const getLeadProfile = (answers) => {
  const counts: Record<ProfileType, number> = {
    [ProfileType.STRIVING_ACHIEVER]: 0,
    [ProfileType.DEPLETED_SURVIVOR]: 0,
    [ProfileType.GUILTY_GIVER]: 0,
    [ProfileType.LOST_WANDERER]: 0,
  };
  answers.forEach(a => counts[a]++);
  let max = -1, winner = ProfileType.STRIVING_ACHIEVER;
  Object.entries(counts).forEach(([t, c]) => { if (c > max) { max = c; winner = t; } });
  return winner;
};

const getSalvations = () => { try { return parseInt(localStorage.getItem('tqa_salvations') || '0'); } catch { return 0; } };

const SilenceSession = ({ onBack, customMusicUrl, intentions, onAddIntention, onSaveJournal, selectedVoice, selectedLang }) => {

  // ── TIMER: use Date.now() — immune to React re-renders ───────────────────
  // endTime = the timestamp when current phase ends
  // If paused, pausedAt stores when we paused
  const endTimeRef   = useRef(null);   // ms timestamp of phase end
  const pausedAtRef  = useRef(null);   // ms timestamp of pause start
  const phaseRef     = useRef('prep');
  const ivlRef       = useRef | null>(null);

  const PREP_MS    = 5 * 60 * 1000;   // 5 minutes
  const SILENCE_MS = 10 * 60 * 1000; // 10 minutes

  const [dispSec,     setDispSec]     = useState(5 * 60);
  const [dispPhase,   setDispPhase]   = useState('prep');
  const [running,     setRunning]     = useState(false);

  // ── Other UI state ────────────────────────────────────────────────────────
  const [intention,    setIntention]   = useState('');
  const [reflection,   setReflection]  = useState('');
  const [saved,        setSaved]       = useState(false);
  const [breath,       setBreath]      = useState('in');
  const [scrIdx,       setScrIdx]      = useState(0);
  const [scrShow,      setScrShow]     = useState(true);
  const [salvations,   setSalvations]  = useState(getSalvations);
  const [celebrate,    setCelebrate]   = useState(false);
  const [voicePlaying, setVoicePlaying]= useState(false);

  // ── Audio ─────────────────────────────────────────────────────────────────
  const musicRef = useRef(null);
  const fadeRef  = useRef | null>(null);
  const voiceRef = useRef(null);

  useEffect(() => {
    const m = new Audio(customMusicUrl || '/music1.mp3'); m.loop = true; m.volume = 0;
    musicRef.current = m;
    const v = new Audio('/voiceover.mp3');
    v.onplay  = () => setVoicePlaying(true);
    v.onended = () => setVoicePlaying(false);
    v.onerror = () => setVoicePlaying(false);
    voiceRef.current = v;
    return () => { m.pause(); v.pause(); };
  }, []); // eslint-disable-line

  const fadeVol = useCallback((to) => {
    const a = musicRef.current; if (!a) return;
    if (fadeRef.current) clearInterval(fadeRef.current);
    const from = a.volume, step = (to - from) / 60; let i = 0;
    fadeRef.current = setInterval(() => {
      i++; a.volume = Math.max(0, Math.min(1, from + step * i));
      if (i >= 60) { a.volume = to; if (!to) a.pause(); clearInterval(fadeRef.current!); }
    }, 50);
  }, []);

  // ── START: set endTime based on current time + remaining duration ─────────
  const startTimer = useCallback(() => {
    const now = Date.now();
    const remaining = dispSec * 1000; // current displayed seconds → ms
    endTimeRef.current  = now + remaining;
    pausedAtRef.current = null;

    if (ivlRef.current) clearInterval(ivlRef.current);

    ivlRef.current = setInterval(() => {
      const now2  = Date.now();
      const left  = Math.max(0, Math.ceil((endTimeRef.current! - now2) / 1000));

      setDispSec(left);

      if (left <= 0) {
        clearInterval(ivlRef.current!);
        if (phaseRef.current === 'prep') {
          phaseRef.current = 'silence';
          setDispPhase('silence');
          // Start 10-minute silence immediately
          endTimeRef.current = Date.now() + SILENCE_MS;
          setDispSec(10 * 60);
          ivlRef.current = setInterval(() => {
            const n = Date.now();
            const l = Math.max(0, Math.ceil((endTimeRef.current! - n) / 1000));
            setDispSec(l);
            if (l <= 0) {
              clearInterval(ivlRef.current!);
              phaseRef.current = 'done';
              setDispPhase('done');
              setRunning(false);
            }
          }, 500);
        } else {
          phaseRef.current = 'done';
          setDispPhase('done');
          setRunning(false);
        }
      }
    }, 500); // tick every 500ms for accuracy
  }, [dispSec]); // eslint-disable-line

  // ── PAUSE ─────────────────────────────────────────────────────────────────
  const pauseTimer = useCallback(() => {
    if (ivlRef.current) clearInterval(ivlRef.current);
    pausedAtRef.current = Date.now();
  }, []);

  // ── TOGGLE ────────────────────────────────────────────────────────────────
  const toggle = () => {
    if (!running) {
      // Resume: adjust endTime by pause duration
      if (pausedAtRef.current && endTimeRef.current) {
        const pauseDuration = Date.now() - pausedAtRef.current;
        endTimeRef.current += pauseDuration;
      }
      startTimer();
      setRunning(true);
    } else {
      pauseTimer();
      setRunning(false);
    }
  };

  const resetTimer = () => {
    if (ivlRef.current) clearInterval(ivlRef.current);
    endTimeRef.current  = null;
    pausedAtRef.current = null;
    phaseRef.current    = 'prep';
    setRunning(false);
    setDispSec(5 * 60);
    setDispPhase('prep');
  };

  useEffect(() => () => { if (ivlRef.current) clearInterval(ivlRef.current); }, []);

  // ── Music & breathing ─────────────────────────────────────────────────────
  useEffect(() => {
    if (running && dispPhase === 'prep') { musicRef.current?.play().catch(()=>{}); fadeVol(0.4); }
    else fadeVol(0);
  }, [running, dispPhase, fadeVol]);

  useEffect(() => {
    if (!running) return;
    setBreath('in');
    let t1, t2;
    const cycle = () => { setBreath('in'); t1=setTimeout(()=>setBreath('hold'),4000); t2=setTimeout(()=>setBreath('out'),8000); };
    cycle(); const id = setInterval(cycle, 14000);
    return () => { clearInterval(id); clearTimeout(t1); clearTimeout(t2); };
  }, [running]);

  useEffect(() => {
    if (!running || dispPhase !== 'silence') return;
    const id = setInterval(() => {
      setScrShow(false);
      setTimeout(() => { setScrIdx(i=>(i+1)%SCRIPTURES.length); setScrShow(true); }, 2000);
    }, 11000);
    return () => clearInterval(id);
  }, [running, dispPhase]);

  // ── Voice ─────────────────────────────────────────────────────────────────
  const playVoice = (fallback) => {
    const v = voiceRef.current;
    if (v) { v.currentTime=0; v.play().catch(()=>speakTTS(fallback)); }
    else speakTTS(fallback);
  };
  const stopVoice = () => { voiceRef.current?.pause(); window.speechSynthesis?.cancel(); setVoicePlaying(false); };
  const speakTTS  = (text) => {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text); u.rate=0.82;
    if (selectedVoice) u.voice=selectedVoice;
    if (selectedLang)  u.lang=selectedLang;
    u.onstart=()=>setVoicePlaying(true); u.onend=()=>setVoicePlaying(false);
    window.speechSynthesis.speak(u);
  };

  // ── Salvation ─────────────────────────────────────────────────────────────
  const confirmSalvation = () => {
    try { const n=getSalvations()+1; localStorage.setItem('tqa_salvations',String(n)); setSalvations(n); } catch { setSalvations(s=>s+1); }
    setCelebrate(true); setTimeout(()=>setCelebrate(false),4000);
  };

  // ── Helpers ───────────────────────────────────────────────────────────────
  const addInt = (e) => { e.preventDefault(); if (intention.trim()) { onAddIntention(intention); setIntention(''); } };
  const mm = Math.floor(dispSec/60);
  const ss = (dispSec%60).toString().padStart(2,'0');
  const breathLabel = breath==='in'?'Breathe In':breath==='hold'?'Hold':'Release';
  const outerScale  = running?(breath==='out'?'scale-100':'scale-[1.22]'):'scale-100';
  const innerScale  = running?(breath==='out'?'scale-95':'scale-105'):'scale-100';

  const S = {
    navDark:  {display:'inline-flex',alignItems:'center',gap:'0.5rem',padding:'0.65rem 1.4rem',borderRadius:'999px',background:'#1c1917',color:'white',fontSize:'0.65rem',letterSpacing:'0.35em',textTransform:'uppercase' ,fontWeight:'bold',border:'none',cursor:'pointer'} ,
    navLight: {display:'inline-flex',alignItems:'center',gap:'0.5rem',padding:'0.65rem 1.4rem',borderRadius:'999px',background:'transparent',color:'#44403c',fontSize:'0.65rem',letterSpacing:'0.35em',textTransform:'uppercase' ,fontWeight:'bold',border:'1px solid #d6d3d1',cursor:'pointer'} ,
    voiceBtn: {display:'inline-flex',alignItems:'center',gap:'0.5rem',padding:'0.5rem 1.4rem',borderRadius:'999px',background:voicePlaying?'#7d8471':'#f5f5f4',color:voicePlaying?'white':'#44403c',fontSize:'0.62rem',letterSpacing:'0.3em',textTransform:'uppercase' ,fontWeight:'bold',border:'none',cursor:'pointer'} ,
  };

  // ── COMPLETE SCREEN ───────────────────────────────────────────────────────
  if (dispPhase === 'done') return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'5rem 1rem'}} className="fade-in">
      <div style={{width:'100%',maxWidth:'56rem',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
        <button type="button" onClick={onBack} style={S.navLight}>← Back to My Results</button>
        <span style={{fontSize:'0.6rem',letterSpacing:'0.5em',textTransform:'uppercase',color:'#a8a29e',fontWeight:'bold'}}>Session Complete</span>
        <div style={{width:'8rem'}}/>
      </div>
      <div className="w-full max-w-4xl bg-white rounded-[6rem] shadow-2xl border border-stone-100 text-center" style={{padding:'4rem'}}>
        <h2 className="text-6xl serif italic mb-6 text-stone-800">Return with Clarity</h2>
        <p className="text-stone-600 mb-8 font-light text-xl leading-relaxed max-w-xl mx-auto serif italic">
          What did the Father speak into your stillness? Record it while your heart is still soft.
        </p>
        <div style={{display:'flex',justifyContent:'center',marginBottom:'1.5rem'}}>
          <button type="button" style={S.voiceBtn} onClick={()=>voicePlaying?stopVoice():playVoice("What did the Father speak into your stillness?")}>
            {voicePlaying?'▐▐  Stop':'▶  Hear Grace\'s Voice'}
          </button>
        </div>
        {!saved ? (
          <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
            <textarea value={reflection} onChange={e=>setReflection(e.target.value)}
              placeholder="Record your soul breakthrough..."
              className="w-full h-56 bg-stone-50 border-2 border-stone-100 rounded-[3rem] p-10 text-stone-700 serif text-xl focus:outline-none focus:ring-2 focus:ring-sage/20 placeholder:opacity-30 leading-relaxed italic" />
            <button type="button" style={{...S.navDark,width:'100%',justifyContent:'center',padding:'1.5rem'}}
              onClick={()=>{if(reflection.trim()){onSaveJournal(reflection);setSaved(true);}}}>
              Save My Breakthrough
            </button>
          </div>
        ) : (
          <div style={{padding:'2rem 0'}}>
            <p className="text-sage text-lg serif italic mb-8">✦ Your reflection has been preserved.</p>
            <button type="button" style={S.navDark} onClick={onBack}>Return to My Results →</button>
          </div>
        )}
      </div>
    </div>
  );

  // ── MAIN SESSION ──────────────────────────────────────────────────────────
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'2rem 1rem',minHeight:'90vh'}} className="fade-in">

      {/* TOP NAV — always visible, dark text */}
      <div style={{width:'100%',maxWidth:'56rem',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem',flexWrap:'wrap',gap:'0.75rem'}}>
        <button type="button" onClick={onBack} style={S.navLight}>← Back to My Results</button>
        <span style={{fontSize:'0.6rem',letterSpacing:'0.5em',textTransform:'uppercase',color:'#7d8471',fontWeight:'bold'}}>
          {dispPhase==='prep'?'Part I · Sacred Silence · 5 Min':'Part II · Holy Stillness · 10 Min'}
        </span>
        <button type="button" onClick={onBack} style={S.navLight}>My Profile →</button>
      </div>

      <div className="w-full max-w-4xl bg-white rounded-[6rem] border border-stone-100 relative overflow-hidden"
        style={{padding:'2.5rem 2rem',boxShadow:'0 60px 120px -30px rgba(0,0,0,0.10)'}}>

        <div className={`absolute top-0 right-0 w-[500px] h-[500px] bg-sage/5 rounded-full -translate-y-1/2 translate-x-1/2 transition-transform duration-[15000ms] ${running?'scale-150 rotate-90':'scale-100'}`}/>
        <div className={`absolute bottom-0 left-0 w-[400px] h-[400px] bg-stone-50 rounded-full translate-y-1/2 -translate-x-1/2 transition-transform duration-[12000ms] ${running?'scale-125 -rotate-45':'scale-100'}`}/>

        <div className="relative z-10 text-center">

          {/* Sacred Deposit */}
          {!running && dispPhase==='prep' && (
            <div style={{marginBottom:'2rem',maxWidth:'36rem',margin:'0 auto 2rem'}} className="fade-in">

    try { return parseInt(localStorage.getItem('qa_salvations') || '0'); } catch { return 0; }
  });
  const [salvationCelebrate, setSalvationCelebrate] = useState(false);
  const [completedSteps, setCompletedSteps] = useState(() => {
    try { return JSON.parse(localStorage.getItem('qa_steps_' + profile.id) || '[]'); } catch { return []; }
  });

  const confirmSalvation = () => {
    const next = salvationCount + 1;
    setSalvationCount(next);
    setSalvationCelebrate(true);
    try { localStorage.setItem('qa_salvations', String(next)); } catch {}
    setTimeout(() => setSalvationCelebrate(false), 3000);
  };

  const completeStep = (stepNum) => {
    if (completedSteps.includes(stepNum)) return;
    const next = [...completedSteps, stepNum];
    setCompletedSteps(next);
    try { localStorage.setItem('qa_steps_' + profile.id, JSON.stringify(next)); } catch {}
  };

  const isStepUnlocked = (stepNum) => {
    if (stepNum === 1) return true;
    return completedSteps.includes(stepNum - 1);
  };
  const [journalSaved, setJournalSaved]   = useState(false);

const CalculatingScreen = () => {
  const [phraseIdx, setPhraseIdx] = React.useState(0);
  const [visible, setVisible]     = React.useState(true);

  React.useEffect(() => {
    const id = setInterval(() => {
      setVisible(false);
      setTimeout(() => { setPhraseIdx(i => (i + 1) % SACRED_PHRASES.length); setVisible(true); }, 700);
    }, 2600);
    return () => clearInterval(id);
  }, []);

  // Soft audio during calculating
  React.useEffect(() => {
    const audio = new Audio('/music1.mp3');
    audio.volume = 0;
    audio.loop   = true;
    audio.play().catch(() => {});
    let vol = 0;
    const fade = setInterval(() => {
      vol = Math.min(0.25, vol + 0.01);
      audio.volume = vol;
      if (vol >= 0.25) clearInterval(fade);
    }, 80);
    return () => {
      clearInterval(fade);
      // Fade out on unmount
      let v = audio.volume;
      const out = setInterval(() => {
        v = Math.max(0, v - 0.03);
        audio.volume = v;
        if (v <= 0) { audio.pause(); clearInterval(out); }
      }, 50);
    };
  }, []);

  return (
    <div style={{minHeight:'60vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', textAlign:'center', padding:'10rem 1rem'}} className="fade-in">
      {/* Rings — all inline styles, no Tailwind dependency */}
      <div style={{position:'relative', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:'5rem', width:'160px', height:'160px'}}>
        <div style={{
          position:'absolute', width:'160px', height:'160px', borderRadius:'50%',
          border:'1px solid rgba(125,132,113,0.15)',
          animation:'ping 3s cubic-bezier(0,0,0.2,1) infinite'
        }}/>
        <div style={{
          position:'absolute', width:'120px', height:'120px', borderRadius:'50%',
          border:'1px solid rgba(125,132,113,0.20)',
          animation:'ping 2.4s cubic-bezier(0,0,0.2,1) infinite',
          animationDelay:'0.4s'
        }}/>
        <div style={{
          width:'56px', height:'56px', borderRadius:'50%',
          border:'2px solid rgba(125,132,113,0.20)',
          borderTopColor:'#7d8471',
          animation:'spin 1s linear infinite'
        }}/>
      </div>
      {/* Phrase */}
      <div style={{opacity: visible ? 1 : 0, transition:'opacity 0.7s ease', minHeight:'5rem', maxWidth:'600px', padding:'0 2rem'}}>
        <h2 style={{fontFamily:'Georgia,serif', fontSize:'clamp(1.5rem,4vw,2.25rem)', fontStyle:'italic', color:'#57534e', lineHeight:1.4}}>
          {SACRED_PHRASES[phraseIdx]}
        </h2>
      </div>
      <p style={{color:'#d6d3d1', fontSize:'0.625rem', letterSpacing:'0.5em', textTransform:'uppercase', marginTop:'2rem', animation:'pulse 2s ease infinite'}}>
        Be still. Your profile is being prepared.
      </p>
      <p style={{color:'#e7e5e4', fontSize:'0.6rem', letterSpacing:'0.3em', textTransform:'uppercase', marginTop:'1rem', fontStyle:'italic', fontFamily:'Georgia,serif'}}>
        "For I know the plans I have for you" — Jeremiah 29:11
      </p>
    </div>
  );
};

    const file = e.target.files?.[0];

    const reader = new FileReader();
    reader.onloadend = () => {
