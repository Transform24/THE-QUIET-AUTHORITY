name: Substack Agent — Daily Devotion

on:
  schedule:
    # 6:00 AM EST = 11:00 AM UTC
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Override mode (daily or sunday)'
        required: false
        default: ''

jobs:
  publish-devotion:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Gemini SDK
        run: pip install google-generativeai

      - name: Run Substack Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODE_OVERRIDE: ${{ github.event.inputs.mode }}
        run: |
          python3 << 'PYEOF'
          import google.generativeai as genai
          import os, datetime, pathlib

          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          model = genai.GenerativeModel('gemini-1.5-flash')

          today = datetime.date.today()
          day_name = today.strftime('%A')
          date_str = today.strftime('%Y-%m-%d')

          mode_override = os.environ.get('MODE_OVERRIDE', '').strip()
          if mode_override:
              mode = mode_override
          elif day_name == 'Sunday':
              mode = 'sunday'
          else:
              mode = 'daily'

          VOICE = """
          BRAND VOICE — SACRED LAW. Never deviate.
          Voice: Sacred, tender, prophetic. Minister — never marketer.
          Audience: Burned-out Christian women, 30-55, spiritual depletion or identity crisis.
          Tone: Warmth, quiet authority, invitation. Never urgency, hype, or guilt.
          FORBIDDEN: Hustle language, self-help jargon, pop-psychology, casual slang, emojis.
          Ministry name: Sanctuary Grace Ministry.
          Every piece closes with a soft CTA linking to: https://sanctuarygrace.store
          """

          if mode == 'sunday':
              prompt = f"""{VOICE}

          Today: {date_str} ({day_name})

          Write the SUNDAY WEEKLY LETTER for The Quiet Authority Substack (600-800 words).

          Structure:
          - Title (sacred, not clickbait, no exclamation marks)
          - Subtitle (one tender line)
          - Personal opening (as if writing to a beloved friend — first-person, present tense)
          - Central teaching (3-4 paragraphs, rooted in one scripture, prophetic and tender)
          - Write the scripture verse in full (include book chapter:verse)
          - Reflection questions (2-3, gentle — not demanding)
          - Closing blessing or prayer
          - Closing CTA (soft, one line): "If you are ready to begin, the door is open at https://sanctuarygrace.store"

          Format as clean markdown. No emojis. No hype. No exclamation marks."""

          else:
              prompt = f"""{VOICE}

          Today: {date_str} ({day_name})

          Write a DAILY DEVOTION for The Quiet Authority Substack (200-300 words).

          Structure:
          - Title (sacred, tender — not clickbait, no exclamation marks)
          - Scripture verse written in full (include reference: Book Chapter:Verse)
          - Reflection (2-3 paragraphs, first-person, tender, speaks to spiritual exhaustion or identity)
          - One invitation (one gentle thing the reader can receive or do today — not a command, an offering)
          - Closing (soft, one line): "Come as you are. https://sanctuarygrace.store"

          Format as clean markdown. No emojis. No hype."""

          response = model.generate_content(prompt)
          content = response.text

          out_dir = pathlib.Path('workflows/output/substack-drafts')
          out_dir.mkdir(parents=True, exist_ok=True)
          out_file = out_dir / f'{date_str}.md'
          out_file.write_text(
              f'---\ndate: {date_str}\nmode: {mode}\nstatus: DRAFT — review before publishing\n---\n\n{content}\n'
          )

          log_file = pathlib.Path('workflows/output/substack-log.md')
          log_entry = f'| {date_str} | {mode} | DRAFT SAVED | {out_file} |\n'
          if log_file.exists():
              log_file.write_text(log_file.read_text() + log_entry)
          else:
              log_file.write_text('| Date | Mode | Status | File |\n|---|---|---|---|\n' + log_entry)

          print(f'Draft saved: {out_file}')
          PYEOF

      - name: Commit and push output
        run: |
          git config user.name "TQA Agent"
          git config user.email "noreply@sanctuarygrace.com"
          git add workflows/output/
          if ! git diff --staged --quiet; then
            git commit -m "Substack Agent: $(date +%Y-%m-%d) devotion draft"
            git push origin HEAD:main
          else
            echo "No new content to commit"
          fi
