name: Substack Agent — Daily Devotion

on:
  schedule:
    # 6:00 AM EST = 11:00 AM UTC
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Override mode (daily or sunday)'
        required: false
        default: ''

jobs:
  publish-devotion:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run Substack Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUBSTACK_SESSION_COOKIE: ${{ secrets.SUBSTACK_SESSION_COOKIE }}
          SUBSTACK_PUBLICATION_URL: ${{ secrets.SUBSTACK_PUBLICATION_URL }}
          MODE_OVERRIDE: ${{ github.event.inputs.mode }}
        run: python3 workflows/scripts/substack_agent.py

      - name: Commit and push output
        run: |
          git config user.name "TQA Agent"
          git config user.email "noreply@sanctuarygrace.com"
          git add workflows/output/
          if ! git diff --staged --quiet; then
            git commit -m "Substack Agent: $(date +%Y-%m-%d) devotion draft"
            git push origin HEAD:main
          else
            echo "No new content to commit"
          fi
