name: Instagram Agent — Daily Post

on:
  schedule:
    # 8:00 AM EST = 13:00 UTC (Mon/Tue/Thu/Fri/Sat only — agent checks day internally)
    - cron: '0 13 * * 1,2,4,5,6'
  workflow_dispatch:
    inputs:
      pillar_override:
        description: 'Override pillar (carousel/scripture/reel/devotional/silence)'
        required: false
        default: ''

jobs:
  post-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run Instagram Agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running as the Instagram Agent for Sanctuary Grace Ministry.
            Read the full agent instructions at: workflows/agents/08-instagram-agent.md
            Then execute all steps exactly as written.

            Environment:
            - IG_ACCESS_TOKEN is available as env var
            - IG_USER_ID is available as env var
            - Pillar override: "${{ github.event.inputs.pillar_override }}"

            If IG_ACCESS_TOKEN is empty, save full post brief to:
            workflows/output/ig-drafts/$(date +%Y-%m-%d).md
          claude_args: |
            --allowedTools Bash,Read,Write
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}

      - name: Commit output
        run: |
          git config user.name "TQA Agent"
          git config user.email "noreply@sanctuarygrace.com"
          git add workflows/output/ || true
          if ! git diff --staged --quiet; then
            BRANCH="agent-output/$(date +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "Instagram Agent: $(date +%Y-%m-%d) output"
            git push -u origin "$BRANCH" || true
          fi
