name: Instagram Agent — Daily Post

on:
  schedule:
    - cron: '0 13 * * 1,2,4,5,6'
  workflow_dispatch:
    inputs:
      pillar_override:
        description: 'Override pillar (carousel/scripture/reel/devotional/silence)'
        required: false
        default: ''

jobs:
  post-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run Instagram Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          PILLAR_OVERRIDE: ${{ github.event.inputs.pillar_override }}
        run: python3 workflows/scripts/instagram_agent.py

      - name: Commit and push output
        env:
          PILLAR_OVERRIDE: ${{ github.event.inputs.pillar_override }}
        run: |
          git config user.name "TQA Agent"
          git config user.email "noreply@sanctuarygrace.com"
          git add workflows/output/
          if ! git diff --staged --quiet; then
            git commit -m "Instagram Agent: $(date +%Y-%m-%d) ${PILLAR_OVERRIDE:-auto} draft"
            git push origin HEAD:main
          else
            echo "No new content to commit"
          fi
