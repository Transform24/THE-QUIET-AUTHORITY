name: YouTube Agent — Weekly Video + Community Post

on:
  schedule:
    - cron: '0 12 * * 3'
    - cron: '0 12 * * 0'
  workflow_dispatch:
    inputs:
      task_override:
        description: 'Override task (video or community)'
        required: false
        default: ''

jobs:
  youtube-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run YouTube Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TASK_OVERRIDE: ${{ github.event.inputs.task_override }}
        run: python3 workflows/scripts/youtube_agent.py

      - name: Commit and push output
        env:
          TASK_OVERRIDE: ${{ github.event.inputs.task_override }}
        run: |
          git config user.name "TQA Agent"
          git config user.email "noreply@sanctuarygrace.com"
          git add workflows/output/
          if ! git diff --staged --quiet; then
            git commit -m "YouTube Agent: $(date +%Y-%m-%d) ${TASK_OVERRIDE:-auto} draft"
            git push origin HEAD:main
          else
            echo "No new content to commit"
          fi
