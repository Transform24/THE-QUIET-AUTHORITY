name: YouTube Agent — Weekly Video + Community Post

on:
  schedule:
    # Wednesday 7:00 AM EST = 12:00 UTC (weekly video)
    - cron: '0 12 * * 3'
    # Sunday 7:00 AM EST = 12:00 UTC (Community tab post)
    - cron: '0 12 * * 0'
  workflow_dispatch:
    inputs:
      task_override:
        description: 'Override task (video or community)'
        required: false
        default: ''

jobs:
  youtube-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run YouTube Agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running as the YouTube Agent for Sanctuary Grace Ministry.
            Read the full agent instructions at: workflows/agents/09-youtube-agent.md
            Then execute all steps exactly as written.

            Environment:
            - YOUTUBE_API_KEY is available as env var
            - YOUTUBE_REFRESH_TOKEN is available as env var
            - YOUTUBE_CLIENT_ID is available as env var
            - YOUTUBE_CLIENT_SECRET is available as env var
            - Task override: "${{ github.event.inputs.task_override }}"

            If API keys are empty, save complete package to:
            workflows/output/yt-drafts/$(date +%Y-%m-%d).md
          claude_args: |
            --allowedTools Bash,Read,Write
        env:
          YOUTUBE_API_KEY: ${{ vars.YOUTUBE_API_KEY }}
          YOUTUBE_REFRESH_TOKEN: ${{ vars.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ vars.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ vars.YOUTUBE_CLIENT_SECRET }}

      - name: Commit output
        run: |
          git config user.name "TQA Agent"
          git config user.email "noreply@sanctuarygrace.com"
          git add workflows/output/ || true
          if ! git diff --staged --quiet; then
            BRANCH="agent-output/$(date +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "YouTube Agent: $(date +%Y-%m-%d) output"
            git push -u origin "$BRANCH" || true
          fi
