name: YouTube Agent — Weekly Video + Community Post

on:
  schedule:
    # Wednesday 7:00 AM EST = 12:00 UTC (video script)
    - cron: '0 12 * * 3'
    # Sunday 7:00 AM EST = 12:00 UTC (community post)
    - cron: '0 12 * * 0'
  workflow_dispatch:
    inputs:
      task_override:
        description: 'Override task (video or community)'
        required: false
        default: ''

jobs:
  youtube-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run YouTube Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TASK_OVERRIDE: ${{ github.event.inputs.task_override }}
        run: |
          cat > /tmp/youtube_agent.py << 'PYEOF'
import urllib.request, json, os, datetime, pathlib

API_KEY = os.environ["GEMINI_API_KEY"]
URL = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={API_KEY}"

def call_gemini(prompt):
    data = json.dumps({"contents": [{"parts": [{"text": prompt}]}]}).encode()
    req = urllib.request.Request(URL, data=data, headers={"Content-Type": "application/json"})
    with urllib.request.urlopen(req, timeout=60) as r:
        return json.loads(r.read())["candidates"][0]["content"]["parts"][0]["text"]

today = datetime.date.today()
day_name = today.strftime("%A")
date_str = today.strftime("%Y-%m-%d")

task_override = os.environ.get("TASK_OVERRIDE", "").strip()
if task_override:
    task = task_override
elif day_name == "Wednesday":
    task = "video"
else:
    task = "community"

VOICE = """
BRAND VOICE — SACRED LAW. Never deviate.
Voice: Sacred, tender, prophetic. Minister — never marketer.
Audience: Burned-out Christian women, 30-55.
FORBIDDEN: Hustle language, emojis in copy, exclamation marks, urgency language.
Ministry: Sanctuary Grace Ministry. Channel: youtube.com/@TheQuietAuthority-f1z
Every description ends with: https://sanctuarygrace.store
"""

SERIES = ["Profile deep dive", "7-day practice walkthrough", "Circle of Silence session", "Scripture reflection"]
series = SERIES[today.isocalendar()[1] % len(SERIES)]

if task == "video":
    prompt = f"""{VOICE}

Today: {date_str} ({day_name})
Content series: {series}

Write a complete VIDEO SCRIPT PACKAGE for The Quiet Authority YouTube channel.

## VIDEO TITLE
Under 60 characters. Sacred, not clickbait. No exclamation marks.

## VIDEO SCRIPT
OPENING STILLNESS (30 seconds): Voiceover inviting the viewer to breathe, arrive, be present.
MAIN TEACHING (8-10 minutes): First-person, tender, prophetic. One central truth. One scripture written in full. 3-4 teaching sections. Speaks directly to the woman who is exhausted, questioning, or lost.
SILENCE INVITATION (2 minutes): Guide the viewer into stillness. Tender, unhurried.
SOFT CLOSE (30 seconds): One blessing. "When you are ready, the door is open at https://sanctuarygrace.store"

## SEO DESCRIPTION
200-250 words. Sacred voice. Mention the spiritual need, one scripture, the free assessment, and the channel.
End with: https://sanctuarygrace.store

## TAGS
8-10 YouTube tags (no # symbol). Mix broad and specific terms.

## PINNED COMMENT
Under 100 words. Tender invitation to the assessment. End with: https://sanctuarygrace.store

## THUMBNAIL BRIEF
1280x720px. Dark background. One profile image (B&W, high contrast). One short Cinzel ALL CAPS line in terra #C1593C. Gold star accent."""

else:
    prompt = f"""{VOICE}

Today: {date_str} ({day_name})

Write a YOUTUBE COMMUNITY POST for The Quiet Authority channel.
- One scripture (written in full with reference)
- 2-3 paragraphs of tender encouragement, first-person, prophetic
- Soft invitation to the assessment or devotional
- Final line: "https://sanctuarygrace.store"
- Total: 100-150 words. No emojis. No exclamation marks."""

content = call_gemini(prompt)

out_dir = pathlib.Path("workflows/output/yt-drafts")
out_dir.mkdir(parents=True, exist_ok=True)
out_file = out_dir / f"{date_str}-{task}.md"
out_file.write_text(f"---\ndate: {date_str}\ntask: {task}\nseries: {series}\nstatus: DRAFT — review before publishing\n---\n\n{content}\n")

log_file = pathlib.Path("workflows/output/yt-log.md")
entry = f"| {date_str} | {task} | {series} | DRAFT SAVED | {out_file} |\n"
if log_file.exists():
    log_file.write_text(log_file.read_text() + entry)
else:
    log_file.write_text("| Date | Task | Series | Status | File |\n|---|---|---|---|---|\n" + entry)

print(f"YouTube draft saved: {out_file}")
PYEOF
          python3 /tmp/youtube_agent.py

      - name: Commit and push output
        run: |
          git config user.name "TQA Agent"
          git config user.email "noreply@sanctuarygrace.com"
          git add workflows/output/
          if ! git diff --staged --quiet; then
            git commit -m "YouTube Agent: $(date +%Y-%m-%d) ${TASK_OVERRIDE:-auto} draft"
            git push origin HEAD:main
          else
            echo "No new content to commit"
          fi
        env:
          TASK_OVERRIDE: ${{ github.event.inputs.task_override }}
