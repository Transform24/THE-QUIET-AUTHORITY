name: Weekly Report Agent

on:
  schedule:
    # Monday 7:00 AM EST = 12:00 UTC
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run Weekly Report Agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running as the Weekly Report Agent for Sanctuary Grace Ministry.
            Read the full agent instructions at: workflows/agents/05-weekly-report-agent.md
            Read all log files in workflows/output/ from the past 7 days.
            Compile the weekly ministry report and save to: workflows/output/weekly-report-$(date +%Y-%m-%d).md
          claude_args: |
            --allowedTools Bash,Read,Write

      - name: Commit output
        run: |
          git config user.name "TQA Agent"
          git config user.email "noreply@sanctuarygrace.com"
          git add workflows/output/ || true
          if ! git diff --staged --quiet; then
            BRANCH="agent-output/report-$(date +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "Weekly Report Agent: $(date +%Y-%m-%d)"
            git push -u origin "$BRANCH" || true
          fi
