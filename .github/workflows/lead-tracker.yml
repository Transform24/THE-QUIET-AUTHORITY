name: Lead Tracker Agent

on:
  workflow_dispatch:
    inputs:
      lead_data:
        description: 'Lead info (name, email, profile) — paste from Formspree notification'
        required: true

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run Lead Tracker Agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running as the Lead Tracker Agent for Sanctuary Grace Ministry.
            Read the full agent instructions at: workflows/agents/04-lead-tracker-agent.md
            New lead data: ${{ github.event.inputs.lead_data }}
            Log to workflows/output/leads.md and tag appropriately.
          claude_args: |
            --allowedTools Bash,Read,Write

      - name: Commit output
        run: |
          git config user.name "TQA Agent"
          git config user.email "noreply@sanctuarygrace.com"
          git add workflows/output/ || true
          if ! git diff --staged --quiet; then
            BRANCH="agent-output/leads-$(date +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "Lead Tracker: $(date +%Y-%m-%d) new lead"
            git push -u origin "$BRANCH" || true
          fi
