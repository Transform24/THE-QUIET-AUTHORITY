name: Storefront Sync Agent — Weekly

on:
  schedule:
    # Monday 6:00 AM EST = 11:00 UTC
    - cron: '0 11 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run Storefront Sync Agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running as the Storefront Sync Agent for Sanctuary Grace Ministry.
            Read the full agent instructions at: workflows/agents/03-storefront-sync-agent.md
            Check index.html against workflows/templates/product-registry.md.
            Report any discrepancies. Save audit to: workflows/output/storefront-audit-$(date +%Y-%m-%d).md
          claude_args: |
            --allowedTools Bash,Read,Write

      - name: Commit output
        run: |
          git config user.name "TQA Agent"
          git config user.email "noreply@sanctuarygrace.com"
          git add workflows/output/ || true
          if ! git diff --staged --quiet; then
            BRANCH="agent-output/storefront-$(date +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "Storefront Sync Agent: $(date +%Y-%m-%d) audit"
            git push -u origin "$BRANCH" || true
          fi
