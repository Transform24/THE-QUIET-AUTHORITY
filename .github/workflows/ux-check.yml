name: UX Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'index.html'

permissions:
  contents: read
  pull-requests: write

jobs:
  ux-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install -D @playwright/test
          npx playwright install chromium --with-deps

      - name: Start local server
        run: python3 -m http.server 8080 &

      - name: Wait for server
        run: sleep 3

      - name: Run UX checks
        run: npx playwright test tests/ux-check.spec.js --reporter=list

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ux-screenshots
          path: test-results/
          retention-days: 14
