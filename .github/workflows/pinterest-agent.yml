name: Pinterest Agent — Daily Pin

on:
  schedule:
    # 9:00 AM EST = 14:00 UTC (peak Pinterest engagement)
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      day_override:
        description: 'Override day number (1-30)'
        required: false
        default: ''

jobs:
  post-pin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run Pinterest Agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running as the Pinterest Agent for Sanctuary Grace Ministry.
            Read the full agent instructions at: workflows/agents/07-pinterest-agent.md
            Then execute all steps exactly as written.

            Environment:
            - PINTEREST_ACCESS_TOKEN is available as env var
            - Day override: "${{ github.event.inputs.day_override }}"

            If PINTEREST_ACCESS_TOKEN is empty, save pin brief to:
            workflows/output/pin-drafts/$(date +%Y-%m-%d).md
            and commit so Grace can post manually.
          claude_args: |
            --allowedTools Bash,Read,Write
        env:
          PINTEREST_ACCESS_TOKEN: ${{ vars.PINTEREST_ACCESS_TOKEN }}

      - name: Commit output
        run: |
          git config user.name "TQA Agent"
          git config user.email "noreply@sanctuarygrace.com"
          git add workflows/output/ || true
          if ! git diff --staged --quiet; then
            BRANCH="agent-output/$(date +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "Pinterest Agent: $(date +%Y-%m-%d) output"
            git push -u origin "$BRANCH" || true
          fi
