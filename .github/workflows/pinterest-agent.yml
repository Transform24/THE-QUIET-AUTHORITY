name: Pinterest Agent — Daily Pin

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      day_override:
        description: 'Override day number (1-30)'
        required: false
        default: ''

jobs:
  post-pin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run Pinterest Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          DAY_OVERRIDE: ${{ github.event.inputs.day_override }}
        run: python3 workflows/scripts/pinterest_agent.py

      - name: Commit and push output
        run: |
          git config user.name "TQA Agent"
          git config user.email "noreply@sanctuarygrace.com"
          git add workflows/output/
          if ! git diff --staged --quiet; then
            git commit -m "Pinterest Agent: $(date +%Y-%m-%d) pin draft"
            git push origin HEAD:main
          else
            echo "No new content to commit"
          fi
